name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake g++ ninja-build pkg-config libwayland-dev \
            qt6-base-dev qt6-multimedia-dev qt6-svg-dev \
            ffmpeg tesseract-ocr
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel 3
      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --parallel 3 --output-on-failure

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install Qt
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check "aqtinstall==3.3.0"
          python -m aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 `
            -O C:\Qt -m qtmultimedia
          "C:\Qt\6.8.3\msvc2022_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_PREFIX_PATH=C:\Qt\6.8.3\msvc2022_64
      - name: Build
        run: cmake --build build --config Release --parallel 3
      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build -C Release --parallel 3 --output-on-failure
