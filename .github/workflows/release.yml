name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    name: Windows x86_64 installers
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Resolve release version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release tag must use vMAJOR.MINOR.PATCH: ${{ github.ref_name }}"
          }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Qt
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check "aqtinstall==3.3.0"
          python -m aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 `
            -O C:\Qt -m qtmultimedia
          "C:\Qt\6.8.3\msvc2022_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Prepare OCR runtime
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP "tesseract-ocr-w64-setup-5.4.0.20240606.exe"
          $install = Join-Path $env:RUNNER_TEMP "tesseract-install"
          $runtime = Join-Path $env:RUNNER_TEMP "eddy-ocr-runtime"
          $deu = Join-Path $env:RUNNER_TEMP "deu.traineddata"
          Invoke-WebRequest `
            -Uri "https://digi.bib.uni-mannheim.de/tesseract/tesseract-ocr-w64-setup-5.4.0.20240606.exe" `
            -OutFile $installer
          $installerHash = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash.ToLower()
          if ($installerHash -ne "c885fff6998e0608ba4bb8ab51436e1c6775c2bafc2559a19b423e18678b60c9") {
            throw "Unexpected Tesseract installer SHA-256: $installerHash"
          }
          Start-Process -FilePath $installer -ArgumentList "/S", "/D=$install" -Wait
          Invoke-WebRequest `
            -Uri "https://github.com/tesseract-ocr/tessdata_fast/raw/refs/tags/4.1.0/deu.traineddata" `
            -OutFile $deu
          $deuHash = (Get-FileHash -LiteralPath $deu -Algorithm SHA256).Hash.ToLower()
          if ($deuHash -ne "19d219bbb6672c869d20a9636c6816a81eb9a71796cb93ebe0cb1530e2cdb22d") {
            throw "Unexpected German tessdata SHA-256: $deuHash"
          }

          New-Item -ItemType Directory -Path (Join-Path $runtime "tessdata") -Force | Out-Null
          Copy-Item -LiteralPath (Join-Path $install "tesseract.exe") -Destination $runtime
          Copy-Item -Path (Join-Path $install "*.dll") -Destination $runtime
          Copy-Item -LiteralPath (Join-Path $install "tessdata\osd.traineddata") `
            -Destination (Join-Path $runtime "tessdata")
          Copy-Item -LiteralPath $deu -Destination (Join-Path $runtime "tessdata")
          Copy-Item -LiteralPath (Join-Path $install "doc\LICENSE") -Destination $runtime
          "TESSERACT_RUNTIME=$runtime" | Out-File -FilePath $env:GITHUB_ENV -Append
          "TESSDATA_PREFIX=$(Join-Path $runtime 'tessdata')" | Out-File -FilePath $env:GITHUB_ENV -Append
          $runtime | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_PREFIX_PATH=C:\Qt\6.8.3\msvc2022_64

      - name: Build
        run: cmake --build build --config Release --parallel 3

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
          EDDY_REQUIRE_OCR: 1
        run: ctest --test-dir build -C Release --parallel 3 --output-on-failure

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --no-progress --yes

      - name: Package installers
        shell: pwsh
        run: |
          ./packaging/windows/build-msi.ps1 `
            -BuildDirectory build `
            -QtDirectory C:\Qt\6.8.3\msvc2022_64 `
            -TesseractDirectory $env:TESSERACT_RUNTIME `
            -Version $env:RELEASE_VERSION
          ./packaging/windows/build-nsis.ps1 `
            -BuildDirectory build `
            -QtDirectory C:\Qt\6.8.3\msvc2022_64 `
            -TesseractDirectory $env:TESSERACT_RUNTIME `
            -Version $env:RELEASE_VERSION

      - name: Generate checksum
        shell: pwsh
        run: |
          $msi = Get-ChildItem dist/msi -Filter '*.msi' -File
          if ($msi.Count -ne 1) { throw "Expected one MSI, found $($msi.Count)" }
          $nsis = Get-ChildItem dist/nsis -Filter '*.exe' -File
          if ($nsis.Count -ne 1) { throw "Expected one NSIS installer, found $($nsis.Count)" }
          @($msi, $nsis) | Sort-Object Name | ForEach-Object {
            "$((Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLower())  $($_.Name)"
          } | Set-Content -Encoding ascii dist/SHA256SUMS-windows

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: Eddy ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/msi/*.msi
            dist/nsis/*.exe
            dist/SHA256SUMS-windows
